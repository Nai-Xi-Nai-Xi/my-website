<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>内容管理 - 乃希的个人网站</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="admin-body">
    <header class="site-header admin-header">
      <a class="brand" href="/">
        <span class="brand-mark">N</span>
        <span class="brand-name">内容管理</span>
      </a>
      <nav class="nav nav-open">
        <a href="/">前台</a>
        <a href="#sections">栏目</a>
        <a href="#integrations">同步</a>
        <a href="#socials">社交</a>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-top">
        <div>
          <p class="eyebrow">CMS</p>
          <h1>更新个人网站</h1>
        </div>
        <div class="admin-actions">
          <button class="primary-button" type="button" data-save>保存全部</button>
        </div>
      </section>

      <p class="status-line" data-status>正在读取内容...</p>

      <section class="editor-section">
        <div class="editor-heading">
          <p class="eyebrow">PROFILE</p>
          <h2>主页信息</h2>
        </div>
        <div class="form-grid" data-profile-form></div>
      </section>

      <section class="editor-section" id="sections">
        <div class="editor-heading">
          <p class="eyebrow">SECTIONS</p>
          <h2>栏目内容</h2>
        </div>
        <div data-section-editor></div>
      </section>

      <section class="editor-section" id="integrations">
        <div class="editor-heading">
          <p class="eyebrow">INTEGRATIONS</p>
          <h2>咖啡推文同步</h2>
        </div>
        <div data-integration-editor></div>
      </section>

      <section class="editor-section" id="socials">
        <div class="editor-heading">
          <p class="eyebrow">SOCIAL</p>
          <h2>社交平台</h2>
        </div>
        <div data-social-editor></div>
        <button class="ghost-button" type="button" data-add-social>添加平台</button>
      </section>
    </main>

    <script src="/admin.js?v=2" defer></script>
  </body>
</html>
